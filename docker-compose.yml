# Postgres local para a API (apps/api). Usado a partir do M1.
# Suba com: docker compose up -d
services:
  db:
    image: postgres:16-alpine
    container_name: ocr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ocr
      POSTGRES_PASSWORD: ocr
      POSTGRES_DB: ocr
    ports:
      # 55432 no host: 5432/5433 costumam estar ocupadas (Postgres local, túnel SSH, etc.)
      - '55432:5432'
    volumes:
      - ocr-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ocr -d ocr']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ocr-pgdata:
